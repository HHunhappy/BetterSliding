name: Build BetterSliding

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission
        run: chmod +x gradlew
        working-directory: BetterSliding
      
      - name: Build
        run: ./gradlew clean build --no-daemon
        working-directory: BetterSliding

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: BetterSliding
          path: BetterSliding/build/libs/*.jar
